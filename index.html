<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearFocus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icons/icon.png">
</head>
<body>
    <div id="top-progress" class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
    <div class="content">
        <input type="file" id="file-input" accept="image/*" hidden>
        <div id="drop-zone" class="state-view">
            <div class="minimal-icon-btn"><i data-lucide="plus" size="40" stroke-width="1"></i></div>
        </div>
        <div id="processing-view" class="state-view hidden">
            <div class="loader-icon"><i data-lucide="sparkles" size="40" stroke-width="1" class="pulse"></i></div>
        </div>
        <div id="result-view" class="state-view hidden">
            <div class="result-grid">
                <div class="img-preview result" style="grid-column: span 2;">
                    <img id="result-img" src="" alt="">
                </div>
            </div>
            <div class="actions">
                <button id="reset-btn" class="icon-btn"><i data-lucide="x" size="24" stroke-width="1.5"></i></button>
                <button id="download-btn" class="icon-btn primary"><i data-lucide="arrow-down" size="24" stroke-width="1.5"></i></button>
            </div>
        </div>
    </div>

    <script>
        // Safari-friendly loading
        let imglyRemoveBackground = null;

        async function initIA() {
            if (!imglyRemoveBackground) {
                // Dynamic import is better handled by Safari in some contexts
                const module = await import("https://esm.sh/@imgly/background-removal@1.4.5");
                imglyRemoveBackground = module.default;
            }
            return imglyRemoveBackground;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const processingView = document.getElementById('processing-view');
            const resultView = document.getElementById('result-view');
            const resultImg = document.getElementById('result-img');
            const progressBar = document.getElementById('progress-bar');

            let currentBlob = null;

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => { if (e.target.files[0]) process(e.target.files[0]); };

            async function process(file) {
                dropZone.classList.add('hidden');
                processingView.classList.remove('hidden');
                
                try {
                    const removeFn = await initIA();
                    const config = {
                        publicPath: 'https://static.img.ly/packages/@imgly/background-removal-data/1.4.5/dist/',
                        progress: (msg) => {
                            if (msg.includes('fetch')) progressBar.style.width = '30%';
                            if (msg.includes('load')) progressBar.style.width = '60%';
                        }
                    };
                    
                    const blob = await removeFn(file, config);
                    currentBlob = blob;
                    resultImg.src = URL.createObjectURL(blob);
                    
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        processingView.classList.add('hidden');
                        resultView.classList.remove('hidden');
                        progressBar.style.width = '0%';
                    }, 500);
                } catch (err) {
                    console.error(err);
                    alert("Erreur Safari: " + err.message);
                    location.reload();
                }
            }

            document.getElementById('reset-btn').onclick = () => location.reload();
            document.getElementById('download-btn').onclick = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(currentBlob);
                a.download = "cleafocus.png";
                a.click();
            };
        });
    </script>
</body>
</html>
