<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearFocus | Minimalism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ClearFocus">
    <link rel="apple-touch-icon" href="icons/icon.png">
</head>
<body>
    <div id="top-progress" class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div class="content">
        <input type="file" id="file-input" accept="image/*" hidden>
        <div id="drop-zone" class="state-view">
            <div class="minimal-icon-btn"><i data-lucide="plus" size="40" stroke-width="1"></i></div>
        </div>
        <div id="processing-view" class="state-view hidden">
            <div class="loader-icon"><i data-lucide="sparkles" size="40" stroke-width="1" class="pulse"></i></div>
        </div>
        <div id="result-view" class="state-view hidden">
            <div class="result-display">
                <div class="img-preview original"><img id="original-img" src="" alt=""></div>
                <div class="img-preview result"><img id="result-img" src="" alt=""></div>
            </div>
            <div class="actions">
                <button id="reset-btn" class="icon-btn"><i data-lucide="x" size="24" stroke-width="1.5"></i></button>
                <button id="download-btn" class="icon-btn primary"><i data-lucide="arrow-down" size="24" stroke-width="1.5"></i></button>
            </div>
        </div>
    </div>
    <!-- Using a single, reliable module approach -->
    <script type="module">
        import imglyRemoveBackground from "https://esm.sh/@imgly/background-removal@1.1.0";

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
            
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            const processingView = document.getElementById('processing-view');
            const resultView = document.getElementById('result-view');
            const originalImg = document.getElementById('original-img');
            const resultImg = document.getElementById('result-img');
            const progressBar = document.getElementById('progress-bar');
            const resetBtn = document.getElementById('reset-btn');
            const downloadBtn = document.getElementById('download-btn');

            let resultBlob = null;

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); };

            async function handleFile(file) {
                dropZone.classList.add('hidden');
                processingView.classList.remove('hidden');
                originalImg.src = URL.createObjectURL(file);
                
                try {
                    const config = {
                        progress: (msg) => {
                            if (msg.includes('fetch')) progressBar.style.width = '30%';
                            if (msg.includes('load')) progressBar.style.width = '60%';
                        }
                    };
                    const blob = await imglyRemoveBackground(file, config);
                    resultBlob = blob;
                    resultImg.src = URL.createObjectURL(blob);
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        processingView.classList.add('hidden');
                        resultView.classList.remove('hidden');
                        progressBar.style.width = '0%';
                    }, 500);
                } catch (e) {
                    console.error(e);
                    alert("Erreur: " + e.message);
                    location.reload();
                }
            }

            resetBtn.onclick = () => location.reload();
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(resultBlob);
                a.download = "produit.png";
                a.click();
            };
        });
    </script>
</body>
</html>
